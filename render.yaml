services:
  - type: web
    name: storeia
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --threads 100 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: storeia-db
          property: connectionString

databases:
  - name: storeia-db
    plan: free
    databaseName: storeia
    user: storeia
